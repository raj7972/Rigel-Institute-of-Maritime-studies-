<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Liberian CDC | Rigel Institute</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
.hero {
    background: linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),
    url('https://images.unsplash.com/photo-1569263979104-865ab7cd8d13');
    background-size: cover;
    color: white;
    padding: 100px 0;
}

.form-box {
    background: white;
    padding: 25px;
    border-radius: 10px;
}

.card:hover {
    transform: translateY(-5px);
    transition: 0.3s;
}

.cta-bar {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #0d3b66;
    color: white;
    padding: 10px;
}
</style>

</head>
<body>

<!-- HERO -->
<section class="hero">
<div class="container">
<div class="row align-items-center">

<div class="col-md-6">
<h1 class="fw-bold">Liberian CDC / Seaman Book</h1>
<p>Fast Processing | 100% Assistance | Trusted Institute</p>
<button class="btn btn-warning">Apply Now</button>
</div>

<div class="col-md-4 offset-md-2">
<div class="form-box shadow">
<h4>Apply Now</h4>
<form>
<input class="form-control mb-2" placeholder="Name">
<input class="form-control mb-2" placeholder="Phone">
<input class="form-control mb-2" placeholder="Email">
<textarea class="form-control mb-2" placeholder="Message"></textarea>
<button class="btn btn-primary w-100">Submit</button>
</form>
</div>
</div>

</div>
</div>
</section>

<section class="py-5">
<div class="container text-center">

<div class="row">

<div class="col-md-4">
<div class="card shadow p-4">
<i class="fa fa-ship fa-2x mb-3 text-primary"></i>
<h5>Fast Processing</h5>
</div>
</div>

<div class="col-md-4">
<div class="card shadow p-4">
<i class="fa fa-users fa-2x mb-3 text-primary"></i>
<h5>Expert Team</h5>
</div>
</div>

<div class="col-md-4">
<div class="card shadow p-4">
<i class="fa fa-check-circle fa-2x mb-3 text-primary"></i>
<h5>Trusted Institute</h5>
</div>
</div>

</div>
</div>
</section>

<!-- CATEGORIES -->
<section class="bg-light py-5">
<div class="container">
<h2 class="text-center mb-4">Categories</h2>

<div class="row">

<div class="col-md-4">
<div class="card shadow p-3">
<h5>Deck</h5>
<ul>
<li>Passport</li>
<li>STCW</li>
<li>Medical</li>
</ul>
</div>
</div>

<div class="col-md-4">
<div class="card shadow p-3">
<h5>Engine</h5>
<ul>
<li>COC</li>
<li>STCW</li>
</ul>
</div>
</div>

<div class="col-md-4">
<div class="card shadow p-3">
<h5>Offshore</h5>
<ul>
<li>BOSIET</li>
<li>Medical</li>
</ul>
</div>
</div>

</div>
</div>
</section>

<!-- CTA -->
<div class="cta-bar d-flex justify-content-between">
<span>📞 Call Now: +91 XXXXXXXX</span>
<button class="btn btn-warning btn-sm">Apply</button>
</div>

</body>
</html>
